<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0F" />

    <!-- SEO -->
    <title>UNO Cinematic — AAA 3D Card Game</title>
    <meta name="description" content="Play UNO in a stunning cinematic 3D experience. Solo play vs AI bots or online party mode with up to 7 players. Fully featured UNO rules engine with house rule customization." />
    <meta name="keywords" content="UNO, card game, 3D, multiplayer, browser game, online, party game" />

    <!-- OG Tags -->
    <meta property="og:title" content="UNO Cinematic — AAA 3D Card Game" />
    <meta property="og:description" content="Stunning 3D UNO with solo AI bots and online multiplayer. A cinematic card game experience." />
    <meta property="og:type" content="website" />

    <!-- Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical path: prevent flash of unstyled content */
      body {
        margin: 0;
        background: #0A0A0F;
        overflow: hidden;
      }
      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      /* Loading screen before React mounts */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0A0A0F;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        gap: 16px;
        font-family: 'Cinzel', Georgia, serif;
        color: #D4AF37;
        letter-spacing: 0.3em;
        font-size: 2.5rem;
        font-weight: 900;
        transition: opacity 0.5s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #loading-bar-wrap {
        width: 200px;
        height: 2px;
        background: rgba(212,175,55,0.15);
        border-radius: 1px;
        overflow: hidden;
      }
      #loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #A07820, #F0D060, #A07820);
        background-size: 200% 100%;
        animation: fill 1.8s ease-out forwards, sweep 1.2s linear infinite;
      }
      @keyframes fill { from { width: 0% } to { width: 100% } }
      @keyframes sweep { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }
    </style>
  </head>
  <body>
    <!-- Initial loading screen (hidden once React mounts) -->
    <div id="loading-screen">
      UNO
      <div id="loading-bar-wrap">
        <div id="loading-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
